name: Worker Release Artifact

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish when publish_release is true"
        required: false
        default: "v0.0.0-dev"
        type: string
      publish_release:
        description: "Publish public release assets for Takosumi/OpenTofu installs"
        required: false
        default: false
        type: boolean

concurrency:
  group: yurumeet-worker-release-artifact-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Worker artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # pinned: v2.0.2
        with:
          bun-version: 1.3.14

      - name: Cache Bun deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pinned: v5.0.5 (2026)
        with:
          path: ${{ env.BUN_INSTALL_CACHE_DIR }}
          key: ${{ runner.os }}-bun-yurumeet-worker-artifact-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-yurumeet-worker-artifact-

      - run: bun install --frozen-lockfile
      - run: bun run check:core-release
      - run: bun run check
      - run: bun run test
      - run: bun run build:takos-worker

      - name: Write Takosumi artifact manifest
        shell: bash
        run: |
          set -euo pipefail
          artifact="dist/takos-worker.js"
          if [[ ! -f "${artifact}" ]]; then
            echo "missing ${artifact}; build:takos-worker must produce the deployable Worker module" >&2
            exit 1
          fi
          sha256="$(sha256sum "${artifact}" | awk '{print $1}')"
          mkdir -p dist/takosumi-artifact
          cp "${artifact}" dist/takosumi-artifact/worker.js
          printf '%s  %s\n' "${sha256}" "worker.js" > dist/takosumi-artifact/worker.js.sha256
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${{ inputs.release_tag }}"
          fi
          artifact_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/worker.js"
          manifest_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/takosumi-artifact.json"
          jq -n \
            --arg kind "takosumi.worker-artifact@v1" \
            --arg app "yurumeet" \
            --arg commit "${GITHUB_SHA}" \
            --arg ref "${GITHUB_REF_NAME}" \
            --arg releaseTag "${release_tag}" \
            --arg artifactUrl "${artifact_url}" \
            --arg manifestUrl "${manifest_url}" \
            --arg sha256 "${sha256}" \
            '{
              kind: $kind,
              app: $app,
              commit: $commit,
              ref: $ref,
              releaseTag: $releaseTag,
              artifact: {
                filename: "worker.js",
                url: $artifactUrl,
                sha256: $sha256,
                sha256Prefixed: ("sha256:" + $sha256),
                contentType: "application/javascript"
              },
              manifestUrl: $manifestUrl
            }' > dist/takosumi-artifact/takosumi-artifact.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned: v7.0.1 (2026)
        with:
          name: yurumeet-takosumi-worker-artifact
          path: dist/takosumi-artifact/
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_release == true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            prerelease_flag=()
            target_flag=(--verify-tag)
          else
            release_tag="${{ inputs.release_tag }}"
            prerelease_flag=(--prerelease)
            target_flag=(--target "${GITHUB_SHA}")
          fi
          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "release_tag must be SemVer-like and start with v: ${release_tag}" >&2
            exit 1
          fi
          if ! gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release create "${release_tag}" \
              --title "Yurumeet ${release_tag}" \
              --notes "Takosumi/OpenTofu Worker artifact for ${GITHUB_SHA}." \
              "${target_flag[@]}" \
              "${prerelease_flag[@]}"
          fi
          release_commit="$(gh api \
            "repos/${GITHUB_REPOSITORY}/commits/${release_tag}" \
            --jq '.sha')"
          if [[ "${release_commit}" != "${GITHUB_SHA}" ]]; then
            echo "refusing to upload release assets: ${release_tag} resolves to ${release_commit}, expected ${GITHUB_SHA}" >&2
            exit 1
          fi
          existing_dir="$(mktemp -d)"
          trap 'rm -rf "${existing_dir}"' EXIT
          for asset in worker.js worker.js.sha256 takosumi-artifact.json; do
            if gh release download "${release_tag}" \
              --pattern "${asset}" \
              --dir "${existing_dir}" >/dev/null 2>&1; then
              if ! cmp -s \
                "${existing_dir}/${asset}" \
                "dist/takosumi-artifact/${asset}"; then
                echo "refusing to mutate existing release asset ${asset}: ${release_tag}" >&2
                exit 1
              fi
            fi
          done
          gh release upload "${release_tag}" \
            dist/takosumi-artifact/worker.js \
            dist/takosumi-artifact/worker.js.sha256 \
            dist/takosumi-artifact/takosumi-artifact.json \
            --clobber
